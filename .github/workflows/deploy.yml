name: Deploy Quartz site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout world-tree (content)
        uses: actions/checkout@v4
        with:
          path: world-tree

      - name: Checkout Quartz (v4)
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: quartz
        run: npm ci

      - name: Replace sample content with world-tree
        run: |
          rm -rf quartz/content
          mkdir -p quartz/content
          cp -r world-tree/artifacts   quartz/content/
          cp -r world-tree/npcs        quartz/content/
          cp -r world-tree/lore        quartz/content/
          cp -r world-tree/quests      quartz/content/
          cp -r world-tree/guild       quartz/content/
          cp -r world-tree/rules       quartz/content/
          cp -r world-tree/skills      quartz/content/
          cp -r world-tree/templates   quartz/content/
          # Normalise template filenames: README.template.md → README.md
          # so Quartz URLs read cleanly (/templates/spirit-template/README).
          find quartz/content/templates -name '*.template.md' -print0 \
            | while IFS= read -r -d '' f; do
                mv "$f" "${f%.template.md}.md"
              done
          # index.md is the immersive landing page (its own file, not README).
          # README.md stays as the GitHub repo README.
          cp world-tree/index.md        quartz/content/index.md
          cp world-tree/ARCHITECTURE.md quartz/content/ARCHITECTURE.md
          cp world-tree/ONBOARDING.md   quartz/content/ONBOARDING.md

      - name: Patch Quartz config for yazelin.github.io/world-tree
        working-directory: quartz
        run: |
          sed -i 's|pageTitle: .*|pageTitle: "世界樹 · World Tree",|' quartz.config.ts
          sed -i 's|baseUrl: .*|baseUrl: "yazelin.github.io/world-tree",|' quartz.config.ts
          # Typography — use CJK-friendly Google Fonts
          sed -i 's|header: "[^"]*"|header: "Noto Serif TC"|' quartz.config.ts
          sed -i 's|body: "[^"]*"|body: "Noto Sans TC"|' quartz.config.ts
          # Quartz default ignorePatterns excludes "templates"; allow it through
          sed -i 's|, *"templates"||' quartz.config.ts
          sed -i 's|"templates", *||' quartz.config.ts
          # Forest palette (replacing each default hex; all tokens are
          # distinct between light/dark modes except tertiary/highlight
          # which we intentionally share across modes).
          # Light mode
          sed -i 's|"#faf8f8"|"#f3efe5"|g' quartz.config.ts
          sed -i 's|"#e5e5e5"|"#d5cfbf"|g' quartz.config.ts
          sed -i 's|"#b8b8b8"|"#8a8268"|g' quartz.config.ts
          sed -i 's|"#4e4e4e"|"#3c4a3e"|g' quartz.config.ts
          sed -i 's|"#2b2b2b"|"#1e2a22"|g' quartz.config.ts
          sed -i 's|"#284b63"|"#2d4a3e"|g' quartz.config.ts
          sed -i 's|"#fff23688"|"#c9a24d59"|g' quartz.config.ts
          # Dark mode
          sed -i 's|"#161618"|"#1a2921"|g' quartz.config.ts
          sed -i 's|"#393639"|"#2d4a3e"|g' quartz.config.ts
          sed -i 's|"#646464"|"#6f7d70"|g' quartz.config.ts
          sed -i 's|"#d4d4d4"|"#c5cbb8"|g' quartz.config.ts
          sed -i 's|"#ebebec"|"#e8dcc0"|g' quartz.config.ts
          sed -i 's|"#7b97aa"|"#c9a24d"|g' quartz.config.ts
          sed -i 's|"#b3aa0288"|"#c9a24d40"|g' quartz.config.ts
          # Shared (both modes → gold accent / gold highlight)
          sed -i 's|"#84a59d"|"#c9a24d"|g' quartz.config.ts
          sed -i 's|"rgba(143, 159, 169, 0.15)"|"rgba(201, 162, 77, 0.18)"|g' quartz.config.ts
          grep -E "pageTitle|baseUrl|header:|body:|ignorePatterns" quartz.config.ts

      - name: Apply forest theme overrides
        run: |
          cp world-tree/quartz-overrides/custom.scss quartz/quartz/styles/custom.scss
          head -5 quartz/quartz/styles/custom.scss

      - name: Enlarge Graph nodes (easier to click, more readable)
        working-directory: quartz
        run: |
          sed -i 's|Component\.Graph(),|Component.Graph({ localGraph: { scale: 1.3, fontSize: 0.7, opacityScale: 1.8, drag: true, zoom: true }, globalGraph: { scale: 1.2, fontSize: 0.6, opacityScale: 1.6 } }),|' quartz.layout.ts
          grep "Component.Graph" quartz.layout.ts || echo "WARN: Graph line not found (upstream Quartz structure may have changed)"

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
